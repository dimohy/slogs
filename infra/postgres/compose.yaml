services:
  postgres:
    image: docker.io/library/postgres:16
    container_name: slogs-postgres
    environment:
      POSTGRES_DB: slogs
      POSTGRES_USER: slogs
      POSTGRES_PASSWORD: slogs_dev_password
    ports:
      - "54329:5432"
    volumes:
      - slogs-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slogs -d slogs"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  slogs-postgres-data:
