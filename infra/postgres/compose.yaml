services:
  embeddinggemma:
    image: docker.io/ollama/ollama:0.11.10
    container_name: slogs-embeddinggemma
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    ports:
      - "11434:11434"
    volumes:
      - slogs-embeddinggemma-data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint:
      - /bin/sh
      - -lc
    command:
      - |
        test -e /dev/nvidiactl || { echo "NVIDIA GPU is required for EmbeddingGemma"; exit 1; }
        ollama serve &
        server=$$!
        until ollama list >/dev/null 2>&1; do sleep 1; done
        ollama pull embeddinggemma
        wait $$server
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q embeddinggemma"]
      interval: 10s
      timeout: 5s
      retries: 60

  postgres:
    image: docker.io/pgvector/pgvector:pg16
    container_name: slogs-postgres
    environment:
      POSTGRES_DB: slogs
      POSTGRES_USER: slogs
      POSTGRES_PASSWORD: slogs_dev_password
    ports:
      - "54329:5432"
    volumes:
      - slogs-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slogs -d slogs"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  slogs-embeddinggemma-data:
  slogs-postgres-data:
