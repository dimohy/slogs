name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check release version
        run: |
          node - <<'NODE'
          const fs = require("node:fs");
          const manifest = JSON.parse(fs.readFileSync("manifest.json", "utf8"));
          const versions = JSON.parse(fs.readFileSync("versions.json", "utf8"));
          const tag = process.env.GITHUB_REF_NAME;
          if (manifest.version !== tag) {
            throw new Error(`manifest version ${manifest.version} does not match tag ${tag}`);
          }
          if (versions[tag] !== manifest.minAppVersion) {
            throw new Error(`versions.json must map ${tag} to ${manifest.minAppVersion}`);
          }
          NODE

      - name: Typecheck
        run: npm run check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Attest main.js
        uses: actions/attest@v4
        with:
          subject-path: main.js

      - name: Attest manifest.json
        uses: actions/attest@v4
        with:
          subject-path: manifest.json

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" main.js manifest.json \
            --title "$TAG_NAME" \
            --notes "Slogs Sync $TAG_NAME" \
            --latest \
            --verify-tag
